<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALCULATOR</title>
<script>

function add(num)
{
let display = document.getElementById("text").value;
if(display === " ")
{
document.getElementById("text").value="0";
}
else
{
switch (num)
{

case 0:
document.getElementById("text").value=display+"0";
break;
case 1:
document.getElementById("text").value=display+"1";
break;
case 2:
document.getElementById("text").value=display+"2";
break;
case 3:
document.getElementById("text").value=display+"3";
break;
case 4:
document.getElementById("text").value=display+"4";
break;
case 5:
document.getElementById("text").value=display+"5";
break;
case 6:
document.getElementById("text").value=display+"6";
break;
case 7:
document.getElementById("text").value=display+"7";
break;
case 8:
document.getElementById("text").value=display+"8";
break;
case 9:
document.getElementById("text").value=display+"9";
break;
case 10:
document.getElementById("text").value=display+"10";
break;
case 11:
document.getElementById("text").value=display+"+";
break;
case 12:
document.getElementById("text").value=display+"-";
break;
case 13:
document.getElementById("text").value=display+"*";
break;
case 14:
document.getElementById("text").value=display+"/";
break;
case 15:
var arr=[];
arr=display.split("");
let a=arr.pop();
document.getElementById("text").value=arr.join("");
break;
case 16:
document.getElementById("text").value="";
break;
}
}
}

function result()
{

let display=document.getElementById("text").value;
document.getElementById("text").value=eval(display);

}
</script>
<link rel="stylesheet"  href="style1.css">

<link href="https://fonts.googleapis.com/css2?family=Amarante&family=Carter+One&family=Lilita+One&display=swap" rel="stylesheet">

</head>
<body>
<h2>Simple Calculator</h2>
<br>
<div class="box">

<input type="text" id="text">
<div class="btn">

<button  onclick="add(15)">🔙</button>
<button  onclick="add(16)">©️</button>
<button  onclick="result()" >🟰</button> 
<button  onclick="add(0)" >0️⃣</button>
<button  onclick="add(1)" >1️⃣</button>
<button  onclick="add(2)" >2️⃣</button>
<button  onclick="add(3)" >3️⃣</button>
<button  onclick="add(4)" >4️⃣</button>
<button onclick="add(5)" >5️⃣</button>
<button onclick="add(6)" >6️⃣</button>
<button  onclick="add(7)" >7️⃣</button>
<button  onclick="add(8)" >8️⃣</button>
<button onclick="add(9)" >9️⃣</button>
<button onclick="add(10)" >🔟</button>
<button  onclick="add(11)" >➕</button>
<button  onclick="add(12)" >➖</button>
<button  onclick="add(13)" >✖️</button>
<button  onclick="add(14)" >➗</button>

</div>

</div>
</body>
</html>
